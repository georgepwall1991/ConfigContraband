name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ConfigContraband.slnx

      - name: Build
        run: dotnet build ConfigContraband.slnx --configuration Release --no-restore

      - name: Verify formatting
        run: dotnet format ConfigContraband.slnx --verify-no-changes --no-restore --verbosity minimal

      - name: Test
        run: dotnet test ConfigContraband.slnx --configuration Release --no-build --logger trx --results-directory TestResults --collect:"XPlat Code Coverage"

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          directory: TestResults
          fail_ci_if_error: true
          use_oidc: true

      - name: Pack
        run: dotnet pack src/ConfigContraband/ConfigContraband.csproj --configuration Release --no-build --output artifacts/packages

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: artifacts/packages
